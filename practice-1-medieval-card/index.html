<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Практика №1 - Карточка товара</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shop-page">
    <section class="product-card">
      <img
        class="product-card__image"
        src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/87/Collection_ancienne%2C_armure_m%C3%A9di%C3%A9vale%2C_30.jpg/640px-Collection_ancienne%2C_armure_m%C3%A9di%C3%A9vale%2C_30.jpg"
        alt="Средневековый доспех на витрине"
      >

      <div class="product-card__body">
        <h1 class="product-card__title">Рыцарский доспех "Страж Цитадели"</h1>
        <p class="product-card__description">
          Кованый комплект из стали с кожаными вставками. Подходит для фестивалей,
          исторических реконструкций и тематических фотосессий.
        </p>
        <button class="product-card__button" type="button">Добавить в заказ</button>
      </div>
    </section>
  </main>
</body>
</html>
